<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes">
<title>Unity WebGL Player | PadmaResidence</title>
<link rel="stylesheet" href="TemplateData/style.css">

<style>
:root {
    --app-height: 100vh;

    --padma-gold: #9b8a4a;
    --padma-gold-light: #c6b36a;
    --padma-gold-dark: #746431;
    --padma-dark: #252122;
    --padma-charcoal: #3f3f3f;
    --padma-cream: #f2eadc;
    --padma-cream-soft: #f7f1e6;
    --padma-green: #005b42;
    --padma-white: #ffffff;
}

html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    min-height: 100%;
    overflow: hidden;
    background: var(--padma-dark);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}

#unity-container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: var(--app-height);
    overflow: hidden;
    background: transparent;
    z-index: 2;
    pointer-events: none;
}

#unity-canvas {
    position: fixed;
    inset: 0;
    width: 100vw !important;
    height: var(--app-height) !important;
    background: transparent !important;
    z-index: 2;
    pointer-events: none;
}

#webcam-video {
    width: 1px;
    height: 1px;
    position: fixed;
    left: 0;
    top: 0;
    opacity: 0;
    pointer-events: none;
}

#video-canvas {
    position: fixed;
    inset: 0;
    width: 100vw !important;
    height: var(--app-height) !important;
    object-fit: cover;
    z-index: 1;
    pointer-events: none;
}

.ctaDiv {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: var(--app-height);
    z-index: 9998;
    box-sizing: border-box;
    padding: 24px;
    font-family: Arial, sans-serif;
}

/* START / ALLOW ACCESS SCREEN */
#startARDiv {
    background:
        linear-gradient(
            145deg,
            rgba(37, 33, 34, 0.48) 0%,
            rgba(31, 47, 42, 0.38) 45%,
            rgba(0, 91, 66, 0.32) 100%
        ),
        url("TemplateData/padma-liquid-bg.png");

    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;

    color: var(--padma-white);
    text-align: center;
    z-index: 10000;
    pointer-events: auto;
}

.start-stack {
    width: min(86vw, 390px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* FINAL CLEAR FROSTED LIQUID GLASS CARD */
.start-card,
.loading-card {
    position: relative;
    overflow: hidden;
    border-radius: 36px;
    box-sizing: border-box;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.12) 0%,
            rgba(255,255,255,0.05) 20%,
            rgba(255,255,255,0.03) 42%,
            rgba(0,91,66,0.10) 100%
        ),
        rgba(18, 28, 25, 0.34);

    border: 1px solid rgba(94,191,166,0.24);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.28),
        inset 1px 1px 1px rgba(255,255,255,0.36),
        inset -1px -1px 1px rgba(0,0,0,0.12),
        inset 0 0 0 1px rgba(255,255,255,0.06);

    backdrop-filter: blur(10px) saturate(100%) brightness(1.10);
    -webkit-backdrop-filter: blur(15px) saturate(100%) brightness(1.10);
}

.start-card {
    width: 100%;
    padding: 22px 26px 28px;
}

/* embossed thick edge */
.start-card::before,
.loading-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    padding: 5px;

    background:
        linear-gradient(
            145deg,
            rgba(94,191,166,0.35) 0%,
            rgba(255,255,255,0.20) 22%,
            rgba(255,255,255,0.07) 48%,
            rgba(0,0,0,0.08) 76%,
            rgba(232,223,173,0.35) 100%
        );

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    filter: blur(0.1px);
    opacity: 0.95;
}

/* soft edge distortion only */
.start-card::after,
.loading-card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    padding: 7px;

    background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.24) 0%, transparent 18%),
        radial-gradient(circle at 86% 20%, rgba(255,255,255,0.12) 0%, transparent 20%),
        radial-gradient(circle at 22% 84%, rgba(190,230,255,0.12) 0%, transparent 18%),
        radial-gradient(circle at 84% 86%, rgba(255,220,160,0.10) 0%, transparent 18%),
        linear-gradient(
            120deg,
            rgba(255,255,255,0.16) 0%,
            rgba(255,255,255,0.04) 16%,
            transparent 34%,
            transparent 64%,
            rgba(255,255,255,0.05) 82%,
            rgba(255,255,255,0.16) 100%
        );

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    filter: blur(5px);
    opacity: 0.70;
    mix-blend-mode: screen;
}

.glass-highlight {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 62%;
    height: 34px;
    border-radius: 999px;
    pointer-events: none;

    background:
        radial-gradient(
            ellipse at center,
            rgba(255,255,255,0.20) 0%,
            rgba(255,255,255,0.11) 45%,
            rgba(255,255,255,0.02) 72%,
            transparent 100%
        );

    filter: blur(8px);
    z-index: 1;
    opacity: 0.65;
}

.start-card > *,
.loading-card > * {
    position: relative;
    z-index: 2;
}

.start-logo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 0;
    margin-bottom: 14px;
    padding-top: 0;
}

.start-logo {
    width: min(64vw, 220px);
    max-width: 220px;
    height: auto;
    display: block;
    object-fit: contain;
    margin-top: -8px;
}

.start-title {
    font-size: clamp(24px, 6vw, 34px);
    line-height: 1.05;
    font-weight: 800;
    color: var(--padma-white);
    margin-bottom: 14px;
}

.start-description {
    margin: 0 auto 24px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--padma-cream);
    opacity: 0.96;
}

#chooseCamSel {
    width: 100%;
    margin: 0 0 14px;
    padding: 13px 16px;
    border-radius: 999px;

    border: 1px solid rgba(198, 179, 106, 0.38);
    background: rgba(255, 255, 255, 0.12);
    color: white;
    outline: none;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        0 8px 24px rgba(0,0,0,0.16);

    backdrop-filter: blur(12px) saturate(135%);
    -webkit-backdrop-filter: blur(12px) saturate(135%);
}

#chooseCamSel option {
    color: #252122;
}

.start-note {
    margin-top: 18px;
    font-size: 11px;
    color: var(--padma-cream);
    opacity: 0.78;
}

#startARButton {
    width: min(78vw, 340px);
    margin-top: 18px;
    border: 1px solid rgba(242, 234, 220, 0.36);
    border-radius: 999px;
    padding: 15px 28px;

    background:
        linear-gradient(
            135deg,
            var(--padma-gold-light) 0%,
            var(--padma-gold) 48%,
            var(--padma-gold-dark) 100%
        );

    color: var(--padma-white);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 1.8px;

    box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.30);

    position: relative;
    overflow: hidden;
    isolation: isolate;
    transform-origin: center;

    pointer-events: auto;
    cursor: pointer;
}

#startARButton:active {
    transform: scale(0.98);
}

/* LOADING SCREEN */
#custom-loading-screen {
    display: none;
    position: fixed !important;
    inset: 0 !important;
    width: 100vw !important;
    height: var(--app-height) !important;
    z-index: 99999 !important;
    pointer-events: auto;
    font-family: Arial, sans-serif;

    background:
        linear-gradient(
            145deg,
            rgba(37, 33, 34, 0.52) 0%,
            rgba(31, 47, 42, 0.40) 48%,
            rgba(0, 91, 66, 0.34) 100%
        ),
        url("TemplateData/padma-liquid-bg.png");

    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
}

.loading-card {
    position: fixed !important;
    left: 50vw !important;
    top: calc(var(--app-height) / 2) !important;
    transform: translate(-50%, -50%) !important;

    width: min(86vw, 390px);
    padding: 26px 28px 32px;

    color: var(--padma-white);
    text-align: center;
}

.loading-title {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1.25;
    margin-bottom: 8px;
    color: var(--padma-white);
}

.loading-subtitle {
    font-size: 14px;
    opacity: 0.88;
    color: var(--padma-cream);
    margin-bottom: 26px;
}

/* LUXURY LINE PROGRESS BAR */
.luxury-progress-info {
    width: 100%;
    margin: 0 auto 12px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--padma-cream);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1.4px;
    text-shadow:
        0 0 12px rgba(155, 138, 74, 0.32),
        0 1px 2px rgba(0, 0, 0, 0.45);
}

.luxury-progress-track {
    position: relative;
    width: 100%;
    height: 12px;
    margin: 0 auto 22px auto;
    border-radius: 999px;
    overflow: hidden;
    background:
        linear-gradient(
            145deg,
            rgba(242, 234, 220, 0.14),
            rgba(255, 255, 255, 0.05)
        );
    border: 1px solid rgba(155, 138, 74, 0.42);
    box-shadow:
        inset 0 1px 3px rgba(0, 0, 0, 0.32),
        inset 0 -1px 1px rgba(255, 255, 255, 0.08),
        0 10px 26px rgba(0, 0, 0, 0.24);
}

.luxury-progress-track::before {
    content: "";
    position: absolute;
    inset: 1px;
    border-radius: 999px;
    background:
        linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.16),
            rgba(255, 255, 255, 0.02)
        );
    pointer-events: none;
    z-index: 2;
}

#luxury-progress-bar {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background:
        linear-gradient(
            90deg,
            #005b42 0%,
            #9b8a4a 45%,
            #c6b36a 72%,
            #f2eadc 100%
        );
    box-shadow:
        0 0 18px rgba(155, 138, 74, 0.38),
        inset 0 1px 1px rgba(255, 255, 255, 0.32);
    transition: width 0.22s ease;
}

.loading-note {
    margin-top: 18px;
    font-size: 12px;
    color: var(--padma-cream);
    opacity: 0.78;
}



/* LUXURY CARD MORPH ANIMATION ONLY */
#startARDiv.luxury-transition-out {
    pointer-events: none;
}

#startARDiv.luxury-transition-out .start-card {
    opacity: 0;
    transition: opacity 0.08s ease;
}

#startARDiv.luxury-transition-out #startARButton {
    pointer-events: none;
    animation: luxuryButtonDissolve 0.42s cubic-bezier(0.22, 1, 0.36, 1) 0.18s forwards;
}

/* SIMPLE LUXURY BUTTON CLICK: soft glow + clean gold shine */
#startARDiv.button-simple-click #startARButton {
    box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.36),
        0 0 26px rgba(198, 179, 106, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.34);
}

#startARDiv.button-simple-click #startARButton::before {
    content: "";
    position: absolute;
    top: -20%;
    bottom: -20%;
    left: -55%;
    width: 46%;
    border-radius: inherit;
    pointer-events: none;
    background:
        linear-gradient(
            110deg,
            transparent 0%,
            rgba(255, 255, 255, 0.10) 20%,
            rgba(242, 234, 220, 0.58) 48%,
            rgba(198, 179, 106, 0.28) 62%,
            transparent 100%
        );
    filter: blur(0.5px);
    opacity: 0;
    transform: translateX(0) skewX(-18deg);
    mix-blend-mode: screen;
    animation: luxurySimpleButtonShine 0.62s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#startARDiv.button-simple-click #startARButton::after {
    content: "";
    position: absolute;
    inset: 1px;
    border-radius: inherit;
    pointer-events: none;
    border: 1px solid rgba(242, 234, 220, 0.36);
    box-shadow:
        0 0 0 rgba(198, 179, 106, 0),
        inset 0 0 16px rgba(242, 234, 220, 0.14);
    opacity: 0;
    animation: luxurySimpleButtonGlow 0.62s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#custom-loading-screen.luxury-preload {
    display: block !important;
    opacity: 0;
    visibility: hidden;
}

#custom-loading-screen.luxury-reveal {
    display: block !important;
    opacity: 1;
    visibility: visible;
    animation: luxuryLoadingBackgroundReveal 0.72s ease forwards;
}

#custom-loading-screen.luxury-reveal .loading-card {
    animation: luxuryLoadingCardSettle 0.82s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#custom-loading-screen.luxury-reveal .loading-title,
#custom-loading-screen.luxury-reveal .loading-subtitle,
#custom-loading-screen.luxury-reveal .luxury-progress-info,
#custom-loading-screen.luxury-reveal .luxury-progress-track,
#custom-loading-screen.luxury-reveal .loading-note {
    animation: luxuryLoadingContentRise 0.72s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.luxury-transition-layer {
    position: fixed;
    inset: 0;
    z-index: 100000;
    pointer-events: none;
    perspective: 1200px;
    overflow: hidden;
}

.luxury-transition-layer::before {
    content: "";
    position: absolute;
    inset: -20%;
    background:
        radial-gradient(circle at 48% 50%, rgba(198,179,106,0.20) 0%, transparent 22%),
        radial-gradient(circle at 52% 48%, rgba(94,191,166,0.16) 0%, transparent 30%);
    opacity: 0;
    filter: blur(18px);
    animation: luxuryAuraBloom 1.15s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.luxury-morph-card {
    position: fixed;
    overflow: hidden;
    box-sizing: border-box;
    border-radius: 36px;
    color: var(--padma-white);
    text-align: center;
    font-family: Arial, sans-serif;
    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.15) 0%,
            rgba(255,255,255,0.06) 21%,
            rgba(255,255,255,0.035) 44%,
            rgba(0,91,66,0.12) 100%
        ),
        rgba(18, 28, 25, 0.38);
    border: 1px solid rgba(198,179,106,0.34);
    box-shadow:
        0 28px 80px rgba(0,0,0,0.34),
        0 0 54px rgba(198,179,106,0.12),
        inset 1px 1px 1px rgba(255,255,255,0.42),
        inset -1px -1px 1px rgba(0,0,0,0.14),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(14px) saturate(118%) brightness(1.12);
    -webkit-backdrop-filter: blur(18px) saturate(118%) brightness(1.12);
    will-change: left, top, width, height, transform, opacity, filter;
}

.luxury-morph-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    padding: 5px;
    background:
        linear-gradient(
            145deg,
            rgba(242,234,220,0.46) 0%,
            rgba(94,191,166,0.32) 20%,
            rgba(255,255,255,0.10) 48%,
            rgba(0,0,0,0.10) 72%,
            rgba(198,179,106,0.56) 100%
        );
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    filter: blur(0.15px);
    opacity: 1;
}

.luxury-morph-card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    padding: 8px;
    background:
        radial-gradient(circle at 13% 18%, rgba(255,255,255,0.30) 0%, transparent 18%),
        radial-gradient(circle at 86% 22%, rgba(242,234,220,0.15) 0%, transparent 22%),
        radial-gradient(circle at 24% 84%, rgba(94,191,166,0.12) 0%, transparent 20%),
        linear-gradient(120deg, rgba(255,255,255,0.20) 0%, transparent 32%, transparent 66%, rgba(198,179,106,0.16) 100%);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    filter: blur(6px);
    opacity: 0.86;
    mix-blend-mode: screen;
}

.luxury-morph-card .glass-highlight {
    top: 6px;
}

.luxury-morph-shine {
    position: absolute;
    inset: -55%;
    z-index: 3;
    pointer-events: none;
    background:
        linear-gradient(
            105deg,
            transparent 35%,
            rgba(255,255,255,0.00) 42%,
            rgba(242,234,220,0.45) 49%,
            rgba(198,179,106,0.24) 53%,
            transparent 62%
        );
    transform: translateX(-52%) rotate(10deg);
    filter: blur(1px);
    mix-blend-mode: screen;
    animation: luxuryGoldSweep 1.05s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.luxury-morph-rim {
    position: absolute;
    inset: 8px;
    z-index: 3;
    pointer-events: none;
    border-radius: 30px;
    border: 1px solid rgba(242,234,220,0.18);
    box-shadow:
        0 0 28px rgba(198,179,106,0.14),
        inset 0 0 24px rgba(94,191,166,0.08);
    animation: luxuryRimPulse 1.12s ease forwards;
}

.luxury-morph-content-start,
.luxury-morph-content-loading {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 28px;
    box-sizing: border-box;
}

.luxury-morph-content-start {
    animation: luxuryStartContentExit 0.56s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.luxury-morph-content-loading {
    opacity: 0;
    transform: translateY(12px) scale(0.98);
    filter: blur(10px);
    animation: luxuryLoadingContentEnter 0.72s cubic-bezier(0.16, 1, 0.3, 1) 0.36s forwards;
}

.luxury-morph-logo {
    width: min(64vw, 220px);
    max-width: 220px;
    height: auto;
    display: block;
    object-fit: contain;
    margin: -8px auto 14px;
}

.luxury-morph-start-title {
    font-size: clamp(24px, 6vw, 34px);
    line-height: 1.05;
    font-weight: 800;
    margin-bottom: 14px;
}

.luxury-morph-start-desc {
    margin: 0 auto 24px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--padma-cream);
    max-width: 320px;
}

.luxury-morph-camera-pill {
    width: 100%;
    max-width: 338px;
    height: 45px;
    border-radius: 999px;
    border: 1px solid rgba(198,179,106,0.38);
    background: rgba(255,255,255,0.12);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        0 8px 24px rgba(0,0,0,0.16);
}

.luxury-morph-loading-title {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1.25;
    margin-bottom: 8px;
}

.luxury-morph-loading-subtitle {
    font-size: 14px;
    opacity: 0.88;
    color: var(--padma-cream);
    margin-bottom: 26px;
}

.luxury-morph-loading-percent {
    color: var(--padma-cream);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1.4px;
    margin-bottom: 12px;
}

.luxury-morph-progress-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    overflow: hidden;
    background: linear-gradient(145deg, rgba(242,234,220,0.14), rgba(255,255,255,0.05));
    border: 1px solid rgba(155,138,74,0.42);
    box-shadow:
        inset 0 1px 3px rgba(0,0,0,0.32),
        inset 0 -1px 1px rgba(255,255,255,0.08),
        0 10px 26px rgba(0,0,0,0.24);
}

.luxury-morph-progress-fill {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #005b42 0%, #9b8a4a 45%, #c6b36a 72%, #f2eadc 100%);
    box-shadow:
        0 0 18px rgba(155, 138, 74, 0.34),
        inset 0 1px 1px rgba(255, 255, 255, 0.28);
    transition: width 0.24s ease;
}

@keyframes luxurySimpleButtonShine {
    0% { opacity: 0; transform: translateX(0) skewX(-18deg); }
    18% { opacity: 0.88; }
    100% { opacity: 0; transform: translateX(360%) skewX(-18deg); }
}

@keyframes luxurySimpleButtonGlow {
    0% { opacity: 0; transform: scale(0.985); }
    30% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.035); }
}

@keyframes luxuryButtonDissolve {
    0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
    100% { opacity: 0; transform: translateY(18px) scale(0.94); filter: blur(8px); }
}

@keyframes luxuryAuraBloom {
    0% { opacity: 0; transform: scale(0.72) rotate(0deg); }
    42% { opacity: 1; transform: scale(1.04) rotate(8deg); }
    100% { opacity: 0; transform: scale(1.36) rotate(18deg); }
}

@keyframes luxuryGoldSweep {
    0% { transform: translateX(-58%) rotate(10deg); opacity: 0; }
    18% { opacity: 0.9; }
    100% { transform: translateX(58%) rotate(10deg); opacity: 0; }
}

@keyframes luxuryRimPulse {
    0% { opacity: 0; transform: scale(0.98); }
    36% { opacity: 1; transform: scale(1.01); }
    100% { opacity: 0.24; transform: scale(1); }
}

@keyframes luxuryStartContentExit {
    0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
    42% { opacity: 0.28; transform: translateY(-8px) scale(0.985); filter: blur(3px); }
    100% { opacity: 0; transform: translateY(-18px) scale(0.965); filter: blur(12px); }
}

@keyframes luxuryLoadingContentEnter {
    0% { opacity: 0; transform: translateY(14px) scale(0.965); filter: blur(12px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
}

@keyframes luxuryProgressPreview {
    0% { width: 0%; }
    100% { width: 18%; }
}

@keyframes luxuryLoadingBackgroundReveal {
    0% { opacity: 0; filter: blur(8px) brightness(1.08); }
    100% { opacity: 1; filter: blur(0px) brightness(1); }
}

@keyframes luxuryLoadingCardSettle {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.965) !important; filter: blur(10px); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1) !important; filter: blur(0px); }
}

@keyframes luxuryLoadingContentRise {
    0% { opacity: 0; transform: translateY(10px); filter: blur(7px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
}

#errorDiv {
    background:
        linear-gradient(

            rgba(37, 33, 34, 0.62) 0%,
            rgba(31, 47, 42, 0.50) 48%,
            rgba(0, 91, 66, 0.44) 100%
        ),
        url("TemplateData/padma-liquid-bg.png") !important;

    background-size: cover !important;
    background-position: center center !important;
    background-repeat: no-repeat !important;

    color: white;
    text-align: center;
}

#errorText {
    width: min(78vw, 360px) !important;
    padding: 24px;
    border-radius: 24px;
    background: rgba(37, 33, 34, 0.56);
    border: 1px solid rgba(155, 138, 74, 0.60);
    color: var(--padma-cream) !important;
    line-height: 1.5;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.36);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

</style>
</head>

<body>
    <!--IMAGETARGETS-->
    <imagetarget id="bear" src="targets/bear.png"></imagetarget>
    <imagetarget id="bfly" src="targets/bfly.png"></imagetarget>
    <imagetarget id="qrcode" src="targets/qrcode.png"></imagetarget>
    <imagetarget id="lady" src="targets/lady.png"></imagetarget>
    <imagetarget id="reel" src="targets/reel.png"></imagetarget>
    <imagetarget id="rmn" src="targets/rmn.png"></imagetarget>
    <imagetarget id="qrcode - ImageTracker" src="targets/qrcode 1.jpeg"></imagetarget>
    <imagetarget id="PADMA QRCode" src="targets/qrcode.png"></imagetarget>

    <video id="webcam-video" muted autoplay playsinline></video>
    <canvas id="video-canvas"></canvas>

    <div id="startARDiv" class="ctaDiv">
        <div class="start-stack">
            <div class="start-card">
                <div class="glass-highlight"></div>

                <div class="start-logo-wrap">
                    <img src="TemplateData/padma-logo.png" alt="Padma Logo" class="start-logo">
                </div>

                <div class="start-title">Immersive AR Experience</div>

                <p class="start-description">
                    This augmented reality experience requires access to your device camera.
                </p>

                <select id="chooseCamSel" style="display: none;" onchange="SelectCam()"></select>

                <div class="start-note">Point your camera at the marker to begin.</div>
            </div>

            <button id="startARButton" onclick="StartAR()" style="display:none">
                ALLOW ACCESS
            </button>
        </div>
    </div>

    <div id="screenshotDiv" style="display: none;" class="ctaDiv">
        <div class="screenshot-card">
            <img id="screenshotImg" src="" alt="screenshot">
            <button class="popup-close-button" onclick="document.getElementById('screenshotDiv').style.display = 'none';">Close</button>
        </div>
    </div>

    <div id="confirmUrlDiv" style="display: none;" class="ctaDiv">
        <div class="confirm-card">
            <p id="confirmUrlText">Are you sure you want to visit url.com?</p>
            <div class="confirm-buttons">
                <button class="visit-button" onclick="window.open(newUrlString, '_blank').focus(); document.getElementById('confirmUrlDiv').style.display = 'none'">VISIT</button>
                <button class="back-button" onclick="document.getElementById('confirmUrlDiv').style.display = 'none'">BACK</button>
            </div>
        </div>
    </div>

    <div id="errorDiv" class="ctaDiv" style="display: none;">
        <p id="errorText"></p>
    </div>

    <div id="unity-container" class="unity-mobile">
        <canvas id="unity-canvas"></canvas>

        <div id="custom-loading-screen">
            <div class="loading-card">
                <div class="glass-highlight"></div>

                <div class="loading-title">PADMA RESIDENCE</div>
                <div class="loading-subtitle">Loading AR Experience</div>

                <div class="luxury-progress-info">
                    <span id="loading-percent">0%</span>
                </div>

                <div class="luxury-progress-track">
                    <div id="luxury-progress-bar"></div>
                </div>

                <div class="loading-note">Please keep your camera ready</div>
            </div>
        </div>
    </div>

    <script src="arcamera.js" type="text/javascript"></script>
    <script src="itracker.js" type="text/javascript"></script>
    <script src="Build/Padma Residence 0.0.55.loader.js"></script>

    <script>
        function SetAppHeight() {
            const appHeight = window.innerHeight + "px";
            document.documentElement.style.setProperty("--app-height", appHeight);
        }

        SetAppHeight();

        window.addEventListener("resize", SetAppHeight);
        window.addEventListener("orientationchange", function () {
            setTimeout(SetAppHeight, 300);
        });

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#custom-loading-screen");
        var luxuryProgressBar = document.querySelector("#luxury-progress-bar");
        var loadingPercent = document.querySelector("#loading-percent");

        var morphProgressBar = null;
        var morphProgressPercent = null;
        var loadingProgressTarget = 0;
        var loadingProgressDisplay = 0;
        var loadingProgressFrame = null;

        function ClampLoadingPercent(value) {
            value = Number(value);
            if (!isFinite(value)) {
                return 0;
            }
            return Math.max(0, Math.min(100, value));
        }

        function PaintLoadingProgress(value) {
            var cleanValue = ClampLoadingPercent(value);
            var percent = Math.round(cleanValue);
            var widthValue = cleanValue.toFixed(2) + "%";
            var textValue = percent + "%";

            if (luxuryProgressBar != null) {
                luxuryProgressBar.style.width = widthValue;
            }

            if (loadingPercent != null) {
                loadingPercent.innerText = textValue;
            }

            if (morphProgressBar != null) {
                morphProgressBar.style.width = widthValue;
            }

            if (morphProgressPercent != null) {
                morphProgressPercent.innerText = textValue;
            }
        }

        function AnimateLoadingProgress() {
            var distance = loadingProgressTarget - loadingProgressDisplay;

            if (Math.abs(distance) <= 0.08) {
                loadingProgressDisplay = loadingProgressTarget;
                PaintLoadingProgress(loadingProgressDisplay);
                loadingProgressFrame = null;
                return;
            }

            var direction = distance > 0 ? 1 : -1;
            var maxStep = loadingProgressTarget >= 100 ? 1.85 : 0.58;
            var adaptiveStep = Math.max(0.16, Math.abs(distance) * 0.035);
            var step = Math.min(Math.abs(distance), Math.min(maxStep, adaptiveStep));

            loadingProgressDisplay += direction * step;
            PaintLoadingProgress(loadingProgressDisplay);
            loadingProgressFrame = requestAnimationFrame(AnimateLoadingProgress);
        }

        function SetLoadingProgressTarget(value) {
            loadingProgressTarget = ClampLoadingPercent(value);

            if (loadingProgressFrame == null) {
                loadingProgressFrame = requestAnimationFrame(AnimateLoadingProgress);
            }
        }

        function ResetLoadingProgress() {
            if (loadingProgressFrame != null) {
                cancelAnimationFrame(loadingProgressFrame);
                loadingProgressFrame = null;
            }

            loadingProgressTarget = 0;
            loadingProgressDisplay = 0;
            PaintLoadingProgress(0);
        }

        function FinishLoadingProgress(onComplete) {
            SetLoadingProgressTarget(100);

            var startTime = performance.now();

            function waitForLuxuryFinish() {
                var waited = performance.now() - startTime;

                if (loadingProgressDisplay >= 99.2 || waited > 850) {
                    if (loadingProgressFrame != null) {
                        cancelAnimationFrame(loadingProgressFrame);
                        loadingProgressFrame = null;
                    }

                    loadingProgressTarget = 100;
                    loadingProgressDisplay = 100;
                    PaintLoadingProgress(100);

                    setTimeout(onComplete, 180);
                    return;
                }

                requestAnimationFrame(waitForLuxuryFinish);
            }

            waitForLuxuryFinish();
        }

        var initialize = async () => {
            var unityCanvas = document.querySelector("#unity-canvas");
            var videoCanvas = document.querySelector("#video-canvas");

            window.arCamera = new ARCamera(unityCanvas, videoCanvas);
            window.iTracker = new ImageTracker(arCamera);

            try {
                await window.iTracker.initialize();
                console.log("ImageTracker initialized!");
            }
            catch (error) {
                console.error("Failed to initialize ImageTracker. Are you missing opencv.js? " + error);
                ShowError("Failed to initialize the experience.");
                return;
            }

            await LoadWebcams();
            document.getElementById("startARButton").style.display = "block";
        };

        initialize();

        function ResizeCanvases() {
            SetAppHeight();

            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";

            var videoCanvas = document.querySelector("#video-canvas");
            videoCanvas.style.width = window.innerWidth + "px";
            videoCanvas.style.height = window.innerHeight + "px";
        }

        window.addEventListener("resize", ResizeCanvases);
        window.addEventListener("orientationchange", function () {
            setTimeout(ResizeCanvases, 300);
        });


        function PlayStartToLoadingAnimation() {
            var startARDiv = document.getElementById("startARDiv");
            var startCard = document.querySelector(".start-card");
            var startButton = document.getElementById("startARButton");
            var loadingCard = document.querySelector(".loading-card");

            if (startButton != null) {
                startButton.disabled = true;
            }

            if (startARDiv != null) {
                startARDiv.classList.remove("button-simple-click");
                void startARDiv.offsetWidth;
                startARDiv.classList.add("button-simple-click");

                setTimeout(function () {
                    if (startARDiv != null) {
                        startARDiv.classList.remove("button-simple-click");
                    }
                }, 720);
            }

            if (loadingBar == null || startARDiv == null || startCard == null || loadingCard == null) {
                if (startARDiv != null) {
                    startARDiv.style.display = "none";
                }
                if (loadingBar != null) {
                    loadingBar.style.display = "block";
                }
                return;
            }

            loadingBar.classList.remove("luxury-reveal");
            loadingBar.classList.add("luxury-preload");
            loadingBar.style.display = "block";

            var startRect = startCard.getBoundingClientRect();
            var loadingRect = loadingCard.getBoundingClientRect();

            var layer = document.createElement("div");
            layer.className = "luxury-transition-layer";

            var morphCard = document.createElement("div");
            morphCard.className = "luxury-morph-card";
            morphCard.style.left = startRect.left + "px";
            morphCard.style.top = startRect.top + "px";
            morphCard.style.width = startRect.width + "px";
            morphCard.style.height = startRect.height + "px";

            morphCard.innerHTML = `
                <div class="glass-highlight"></div>
                <div class="luxury-morph-shine"></div>
                <div class="luxury-morph-rim"></div>

                <div class="luxury-morph-content-start">
                    <img src="TemplateData/padma-logo.png" alt="Padma Logo" class="luxury-morph-logo">
                    <div class="luxury-morph-start-title">Immersive AR Experience</div>
                    <div class="luxury-morph-start-desc">This augmented reality experience requires access to your device camera.</div>
                    <div class="luxury-morph-camera-pill"></div>
                </div>

                <div class="luxury-morph-content-loading">
                    <div class="luxury-morph-loading-title">PADMA<br>RESIDENCE</div>
                    <div class="luxury-morph-loading-subtitle">Loading AR Experience</div>
                    <div class="luxury-morph-loading-percent">0%</div>
                    <div class="luxury-morph-progress-track">
                        <div class="luxury-morph-progress-fill"></div>
                    </div>
                </div>
            `;

            layer.appendChild(morphCard);
            document.body.appendChild(layer);

            morphProgressBar = morphCard.querySelector(".luxury-morph-progress-fill");
            morphProgressPercent = morphCard.querySelector(".luxury-morph-loading-percent");
            PaintLoadingProgress(loadingProgressDisplay);

            startARDiv.classList.add("luxury-transition-out");

            var startCenterX = startRect.left + startRect.width / 2;
            var startCenterY = startRect.top + startRect.height / 2;
            var endCenterX = loadingRect.left + loadingRect.width / 2;
            var endCenterY = loadingRect.top + loadingRect.height / 2;
            var midLeft = ((startCenterX + endCenterX) / 2) - (startRect.width * 0.92 / 2);
            var midTop = ((startCenterY + endCenterY) / 2) - (startRect.height * 0.92 / 2) - 18;

            var cardAnimation = morphCard.animate([
                {
                    left: startRect.left + "px",
                    top: startRect.top + "px",
                    width: startRect.width + "px",
                    height: startRect.height + "px",
                    transform: "translateZ(0px) rotateX(0deg) scale(1)",
                    opacity: 1,
                    filter: "blur(0px) saturate(1.06) brightness(1.04)",
                    offset: 0
                },
                {
                    left: midLeft + "px",
                    top: midTop + "px",
                    width: (startRect.width * 0.92) + "px",
                    height: (startRect.height * 0.92) + "px",
                    transform: "translateZ(70px) rotateX(3deg) scale(0.985)",
                    opacity: 1,
                    filter: "blur(0px) saturate(1.22) brightness(1.16)",
                    offset: 0.42
                },
                {
                    left: loadingRect.left + "px",
                    top: loadingRect.top + "px",
                    width: loadingRect.width + "px",
                    height: loadingRect.height + "px",
                    transform: "translateZ(38px) rotateX(0deg) scale(1.018)",
                    opacity: 1,
                    filter: "blur(0px) saturate(1.16) brightness(1.10)",
                    offset: 0.78
                },
                {
                    left: loadingRect.left + "px",
                    top: loadingRect.top + "px",
                    width: loadingRect.width + "px",
                    height: loadingRect.height + "px",
                    transform: "translateZ(0px) rotateX(0deg) scale(1)",
                    opacity: 0.96,
                    filter: "blur(0px) saturate(1.08) brightness(1.04)",
                    offset: 1
                }
            ], {
                duration: 1180,
                easing: "cubic-bezier(0.16, 1, 0.3, 1)",
                fill: "forwards"
            });

            setTimeout(function () {
                loadingBar.classList.remove("luxury-preload");
                loadingBar.classList.add("luxury-reveal");
            }, 940);

            setTimeout(function () {
                startARDiv.style.display = "none";
            }, 1040);

            cardAnimation.onfinish = function () {
                setTimeout(function () {
                    if (layer != null && layer.parentNode != null) {
                        layer.parentNode.removeChild(layer);
                    }

                    morphProgressBar = null;
                    morphProgressPercent = null;
                }, 80);
            };
        }

        function StartAR() {
            ResizeCanvases();
            ResetLoadingProgress();

            PlayStartToLoadingAnimation();

            document.getElementById("unity-container").style.pointerEvents = "auto";
            document.getElementById("unity-canvas").style.pointerEvents = "auto";

            createUnityInstance(document.querySelector("#unity-canvas"), {
                dataUrl: "Build/Padma Residence 0.0.55.data.br",
                frameworkUrl: "Build/Padma Residence 0.0.55.framework.js.br",
                codeUrl: "Build/Padma Residence 0.0.55.wasm.br",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "ConceptConveyed",
                productName: "PadmaResidance",
                productVersion: "0.0.55"
            },
            (progress) => {
                var percent = progress * 100;
                SetLoadingProgressTarget(percent);
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;

                FinishLoadingProgress(function () {
                    loadingBar.classList.remove("luxury-preload");
                    loadingBar.classList.remove("luxury-reveal");
                    loadingBar.style.display = "none";

                    RequestWebcam();
                });
            }).catch((error) => {
                console.error("Unity failed to load:", error);

                loadingBar.classList.remove("luxury-preload");
                loadingBar.classList.remove("luxury-reveal");
                loadingBar.style.display = "none";
                ResetLoadingProgress();

                ShowError("Failed to load the AR experience. Please refresh the page.");
            });
        }

        window.unityFacingMode = "environment";

        window.WEBCAM_SETTINGS = {
            video: {
                facingMode: unityFacingMode,
            },
            audio: false
        };

        window.requestingForPermissions = false;

        async function RequestWebcam() {
            window.requestingForPermissions = true;

            try {
                window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                console.log("Webcam access granted");
                window.requestingForPermissions = false;
            }
            catch (err) {
                console.error("getUserMedia error - ", err);
                ShowError("Failed to start the experience. Camera permission was denied");
                window.requestingForPermissions = false;
            }
        }

        async function StartWebcam() {
            console.log("StartWebcam");

            while (window.requestingForPermissions) {
                console.log("Waiting for permissions...");
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            console.log("Got Permissions");

            if (window.webcamStream) {
                const video = document.querySelector("#webcam-video");
                video.srcObject = webcamStream;

                try {
                    await arCamera.startWebcam(video);
                    console.log("Webcam started successfully");
                    window.unityInstance.SendMessage("ARCamera", "OnStartWebcamSuccess");
                }
                catch (err) {
                    console.error("Webcam failed to start - ", err);
                    window.unityInstance.SendMessage("ARCamera", "OnStartWebcamFail");
                }
            }
            else {
                console.error("Webcam failed to start - permission not yet granted");
                window.unityInstance.SendMessage("ARCamera", "OnStartWebcamFail");
            }
        }

        async function LoadWebcams() {
            let camDevices = [];
            let devices = await navigator.mediaDevices.enumerateDevices();

            devices.forEach(mediaDevice => {
                if (mediaDevice.kind === "videoinput") {
                    if (window.unityFacingMode == "environment" && !mediaDevice.label.includes("facing front")) {
                        camDevices.push(mediaDevice);
                    }
                    else if (window.unityFacingMode == "user" && mediaDevice.label.includes("facing front")) {
                        camDevices.push(mediaDevice);
                    }
                    else {
                        camDevices.push(mediaDevice);
                    }
                }
            });

            var select = document.getElementById("chooseCamSel");
            select.style.display = "block";

            var count = 0;
            camDevices = camDevices.reverse();

            camDevices.forEach(mediaDevice => {
                const option = document.createElement("option");
                option.value = mediaDevice.deviceId;

                let label = `Camera ${count}`;

                if (mediaDevice.label) {
                    label = mediaDevice.label;
                }

                const textNode = document.createTextNode(label);
                option.appendChild(textNode);
                select.appendChild(option);
                count++;
            });

            if (select.options.length > 0) {
                iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            }
        }

        function SelectCam() {
            var select = document.getElementById("chooseCamSel");
            window.deviceId = select.value;
            window.WEBCAM_SETTINGS.video["deviceId"] = deviceId;
            iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
        }

        async function FlipCam() {
            arCamera.stopWebcam();
            window.WEBCAM_SETTINGS.video.deviceId = "";

            if (window.WEBCAM_SETTINGS.video.facingMode == "user") {
                window.WEBCAM_SETTINGS.video.facingMode = "environment";
                arCamera.setFlipped(false);
            }
            else {
                window.WEBCAM_SETTINGS.video.facingMode = "user";
                arCamera.setFlipped(true);
            }

            window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
            const video = document.querySelector("#webcam-video");
            video.srcObject = webcamStream;
            await arCamera.startWebcam(video);
        }

        function ShowError(error) {
            document.getElementById("errorDiv").style.display = "flex";
            document.getElementById("errorText").innerHTML = error;
        }

        function ShowScreenshot(dataUrl) {
            document.getElementById("screenshotDiv").style.display = "flex";
            document.getElementById("screenshotImg").src = dataUrl;
        }

        function ShowConfirmUrl(url) {
            document.getElementById("confirmUrlDiv").style.display = "flex";
            window.newUrlString = url;
            document.getElementById("confirmUrlText").innerText = "Are you sure you want to visit " + url;
        }

        window.ITRACKER_GLOBALS = {
            INTERNAL_SMOOTHFACTOR_POS: .075,
        };
    </script>
</body>
